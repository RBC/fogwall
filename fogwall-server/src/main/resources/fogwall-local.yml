server:
  ssh:
    enabled: true
    # port: 2222
    # SSH public keys are registered per-user on the profile page.
  # Allow the Vite dev server to make cross-origin requests to the backend.
  # Vite defaults to port 5173; adjust if you've changed it.
  allowed-origins:
    - http://localhost:5173
  # Use default h2 database for local development - save the sessions there as well
  session-store: jdbc

providers:
  gitea:
    enabled: true
    uri: http://localhost:3000
  gitea-ssh:
    enabled: true
    type: forgejo
    uri: ssh://git@localhost:3022
    api-uri: http://localhost:3000  # needed for SCM identity enrichment — SSH URI can't be used for HTTP API calls
    # api-token: <PAT>  # required when Gitea is configured with REQUIRE_SIGNIN_VIEW=true
    #                    # no env var override — set via external config file or FOGWALL_CONFIG_PROFILES
  # Second SSH provider, to exercise multi-provider SSH routing (#447) against a real host — GitHub's SSH key
  # listing endpoint (GET /users/{login}/keys) is public, so no api-token is needed here.
  github-ssh:
    enabled: true
    type: github
    uri: ssh://git@github.com
    # To actually push/fetch through this provider you need your OWN github.com SSH key loaded in ssh-agent
    # (fogwall relays your forwarded agent — it never holds credentials itself). Steps:
    #   1. Add your real public key under dev's ssh-keys below (replace the placeholder test key, or add a second entry).
    #   2. Add your GitHub username under dev's scm-identities for provider: github-ssh (see below).
    #   3. Add an allow rule + permission for a repo you actually control (see rules/permissions below).
    #   4. Push via: ssh://localhost:2222/github.com/<your-org>/<your-repo>.git (agent forwarding required: ssh -A)
# Three users for local development:
#   admin    — full dashboard access, can approve any push
#   dev      — a developer account; add your SCM identity here to push through the proxy
#   reviewer — approve-only account for testing the approval flow separately from the pusher
#
# To try it out:
#   1. Add your SCM username under dev's scm-identities (e.g. provider: github, username: your-gh-handle)
#   2. Add an allow rule and permission for your test repo (see rules/permissions below)
#   3. Start the server and push with your own PAT
#
# Password format: {noop}plaintext (dev only — use {bcrypt} in production).
auth:
  provider: local

users:
  - username: admin
    password-hash: "{noop}admin"
    roles: [ADMIN]
    emails:
      - admin@example.com

  - username: dev
    password-hash: "{noop}password"
    roles: [ADMIN, SELF_CERTIFY]
    scm-identities:
      - provider: gitea
        username: test-user
      - provider: gitea-ssh
        username: test-user
      # Uncomment and set to your real GitHub username to test the github-ssh provider above:
      # - provider: github-ssh
      #   username: your-gh-handle
    emails:
      - dev@example.com
    ssh-keys:
        - public-key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAILZutQPsqDrByIRlmp6JgAK8DSGzf7+SoKBzjCy+av2J fogwall-test@local"
        # Add your own real key here (the one loaded in your ssh-agent, already registered on github.com)
        # to authenticate against the github-ssh provider — the placeholder key above only works for gitea-ssh
        # since it's pre-registered with the local Gitea test container, not with GitHub.
        # - public-key: "ssh-ed25519 AAAA... you@yourhost"

  - username: reviewer
    password-hash: "{noop}password"

commit:
  author:
    email:
      # Domains allowed for commit authors. Broad defaults for local dev.
      domain:
        allow: "(proton\\.me|gmail\\.com|outlook\\.com|yahoo\\.com|example\\.com)$"
      # Local-parts (before @) that are always blocked regardless of domain.
      local:
        block: "^(noreply|no-reply|bot|nobody)$"
  message:
    block:
      literals:
        - "WIP"
        - "DO NOT MERGE"
        - "fixup!"
        - "squash!"
      patterns:
        - '(?i)(password|secret|token)\s*[=:]\s*\S+'

diff-scan:
  block:
    literals:
      - "internal.corp.example.com"
    patterns:
      - '(?i)https?://[a-z0-9.-]*\.corp\.example\.com\b'

secret-scan:
  enabled: true

binary-blob:
  enabled: true
  max-size-bytes: 104857600
  deny-mime-types:
    - application/pdf
    - application/zip

attestations:
  - id: reviewed-content
    type: checkbox
    label: "I have reviewed the diff and it contains no sensitive or proprietary information"
    required: true
    links:
      - text: "Data classification policy"
        url: "https://policies.corp.example.com/data-classification"
  - id: policy-compliance
    type: checkbox
    label: "This push complies with our open source contribution policy"
    required: true
    links:
      - text: "Open source contribution policy"
        url: "https://policies.corp.example.com/open-source-contribution"
      - text: "Approved license list"
        url: "https://policies.corp.example.com/approved-licenses"
  - id: ticket-ref
    type: text
    label: "Internal ticket or justification reference"
    required: false

# Repo permissions for local dev.
#
# dev:      push access on allowed repos — add your test repo below
# reviewer: approve-only (can review any push dev submits)
# admin:    can also approve via the dashboard by virtue of its ADMIN role
permissions:
  - username: dev
    provider: gitea
    match:
      target: SLUG
      value: .*
      type: REGEX
    grant: PUSH
  - username: dev
    provider: gitea-ssh
    match:
      target: SLUG
      value: .*
      type: REGEX
    grant: PUSH
  # Add more permissions for your own repos, e.g.:
  # - username: dev
  #   provider: github
  #   match:
  #     target: SLUG
  #     value: /your-org/your-repo
  #     type: LITERAL
  #   operation: PUSH
  # For github-ssh (see providers above), scope this to a repo you actually control:
  # - username: dev
  #   provider: github-ssh
  #   match:
  #     target: SLUG
  #     value: /your-org/your-repo
  #     type: LITERAL
  #   grant: PUSH

rules:
  # Evaluated like firewall rules: all allow and deny rules merged into a single list
  # sorted by order (ascending). First matching rule wins.
  deny:
    # Example: block pushes to *.github.io repos
    - enabled: true
      order: 20
      operation: PUSH
      provider: gitea
      match:
        target: NAME
        value: "*.github.io"
        type: GLOB

  allow:
    # Allow fetch and push to this project's own repo
    - enabled: true
      order: 100
      operation: BOTH
      provider: gitea
      match:
        target: SLUG
        value: .*
        type: REGEX
    - enabled: true
      order: 101
      operation: PUSH
      provider: gitea-ssh
      match:
        target: SLUG
        value: .*
        type: REGEX

    # Add more allow rules for your own repos, e.g.:
    # - enabled: true
    #   order: 110
    #   operation: BOTH
    #   provider: github
    #   match:
    #     target: SLUG
    #     value: /your-org/your-repo
    #     type: LITERAL

    # For github-ssh (see providers above), scope this to a repo you actually control:
    # - enabled: true
    #   order: 111
    #   operation: BOTH
    #   provider: github-ssh
    #   match:
    #     target: SLUG
    #     value: /your-org/your-repo
    #     type: LITERAL
