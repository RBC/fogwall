services:

  # ── fogwall ───────────────────────────────────────────────────────────────────
  fogwall:
    build: ..
    ports:
      - "8080:8080"
    volumes:
      - ./fogwall-docker-default.yml:/app/conf/fogwall-docker-default.yml:ro
      # Uncomment to enable debug logging (see docker/log4j2-debug.xml):
#      - ./log4j2-debug.xml:/app/conf/log4j2-debug.xml:ro
    depends_on:
      gitea:
        condition: service_healthy
    environment:
      FOGWALL_API_KEY: "change-me-in-production"
      FOGWALL_CONFIG_PROFILES: docker-default
      # Uncomment together with the volume mount above to activate debug logging:
#      JAVA_TOOL_OPTIONS: -Dlog4j2.configurationFile=/app/conf/log4j2-debug.xml
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  # ── Gitea (local git server) ───────────────────────────────────────────────
  gitea:
    image: docker.io/gitea/gitea:1.25-rootless
    ports:
      - "3000:3000"
      - "3022:2222"    # Gitea SSH (rootless listens on 2222; host maps to 3022)
    environment:
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__security__SECRET_KEY: "change-me-in-production"
      GITEA__server__HTTP_PORT: "3000"
      GITEA__server__DOMAIN: "localhost"
      GITEA__server__SSH_DOMAIN: "localhost"
      GITEA__server__SSH_PORT: "3022"          # advertised port (what git clone URLs show)
      GITEA__server__SSH_LISTEN_PORT: "2222"   # internal listen port
      GITEA__server__START_SSH_SERVER: "true"
      GITEA__database__DB_TYPE: "sqlite3"
      GITEA__log__LEVEL: "Warn"
      GITEA__repository__DEFAULT_BRANCH: "main"
    volumes:
      - gitea-data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3000/api/healthz"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  # ── PostgreSQL (optional — start with: docker compose --profile postgres up) ─
  postgres:
    image: docker.io/postgres:17-alpine
    profiles: [postgres]
    environment:
      POSTGRES_DB: fogwall
      POSTGRES_USER: fogwall
      POSTGRES_PASSWORD: fogwall
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fogwall"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── MySQL (optional — start with: docker compose --profile mysql up) ───────
  mysql:
    image: docker.io/mysql:8.4
    profiles: [mysql]
    environment:
      MYSQL_DATABASE: fogwall
      MYSQL_USER: fogwall
      MYSQL_PASSWORD: fogwall
      MYSQL_ROOT_PASSWORD: fogwall
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ufogwall", "-pfogwall"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── MariaDB (optional — start with: docker compose --profile mariadb up) ───
  mariadb:
    image: docker.io/mariadb:11.4
    profiles: [mariadb]
    environment:
      MARIADB_DATABASE: fogwall
      MARIADB_USER: fogwall
      MARIADB_PASSWORD: fogwall
      MARIADB_ROOT_PASSWORD: fogwall
    ports:
      - "3307:3306"
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ufogwall", "-pfogwall"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── MongoDB (optional — start with: docker compose --profile mongo up) ─────
  mongo:
    image: docker.io/mongo:7
    profiles: [mongo]
    environment:
      MONGO_INITDB_ROOT_USERNAME: fogwall
      MONGO_INITDB_ROOT_PASSWORD: fogwall
      MONGO_INITDB_DATABASE: fogwall
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  # ── Database web UIs (optional) ───────────────────────────────────────────
  mongo-express:
    image: docker.io/mongo-express:1
    profiles: [mongo]
    depends_on:
      - mongo
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: fogwall
      ME_CONFIG_MONGODB_ADMINPASSWORD: fogwall
      ME_CONFIG_MONGODB_URL: mongodb://fogwall:fogwall@mongo:27017/
      ME_CONFIG_BASICAUTH: "false"
    ports:
      - "8081:8081"

  adminer:
    image: docker.io/adminer:4
    profiles: [postgres, mysql, mariadb]
    ports:
      - "8082:8080"

volumes:
  gitea-data:
  postgres-data:
  mysql-data:
  mariadb-data:
  mongo-data:
