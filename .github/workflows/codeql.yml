name: "CodeQL"

permissions: read-all

on:
  push:
    branches: ["main", "release/*"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: '22 13 * * 3'

jobs:
  analyze:
    name: ${{ matrix.language }}
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
          - language: java-kotlin
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0

      - name: Set up Java
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # ratchet:actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: gradle

      - name: Set up Node
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # ratchet:actions/setup-node@v6
        with:
          node-version: '26.3.1'
          cache: npm
          cache-dependency-path: fogwall-dashboard/frontend/package-lock.json

      - name: Initialize CodeQL
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # ratchet:github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.language == 'java-kotlin' && 'manual' || 'none' }}

      - name: Build Java
        if: matrix.language == 'java-kotlin'
        run: ./gradlew classes testClasses --no-build-cache

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # ratchet:github/codeql-action/analyze@v4
        with:
          category: "/language:${{matrix.language}}"
