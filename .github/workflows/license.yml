name: License Compliance

permissions:
  contents: read

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  license-gradle:
    name: Gradle (license)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0

      - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # ratchet:actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: gradle

      - name: Check licenses
        run: ./gradlew checkLicense -PskipFrontend

      - name: Upload license report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7
        with:
          name: gradle-license-report
          path: "**/build/reports/dependency-license/"
          retention-days: 30

  license-npm:
    name: npm (license)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0

      - name: Install dependencies
        run: npm ci --prefer-offline
        working-directory: fogwall-dashboard/frontend

      - name: Check licenses
        run: npm run license-check
        working-directory: fogwall-dashboard/frontend
