name: License Compliance

permissions:
  contents: read

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  license-gradle:
    name: Gradle (license)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # ratchet:actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: gradle

      - name: Check licenses
        run: ./gradlew checkLicense -PskipFrontend

      - name: Upload license report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7
        with:
          name: gradle-license-report
          path: "**/build/reports/dependency-license/"
          retention-days: 30

  license-npm:
    name: npm (license)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

      - name: Install dependencies
        run: npm ci --prefer-offline
        working-directory: git-proxy-java-dashboard/frontend

      - name: Check licenses
        run: npm run license-check
        working-directory: git-proxy-java-dashboard/frontend
