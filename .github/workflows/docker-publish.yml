name: Docker Build & Publish

on:
  push:
    branches: ["main", "release/*"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      version:
        description: "Emergency: version tag to publish (e.g. v1.0.0-alpha.9)"
        required: true
        type: string

permissions:
  contents: read

# On main, give every commit its own concurrency group (via SHA) so build+scan runs never
# cancel each other — each landed commit is fully built and scanned in parallel. Tags never
# cancel (release builds). PR/other refs cancel superseded runs on new pushes.
concurrency:
  group: docker-${{ github.ref }}${{ github.ref == 'refs/heads/main' && format('-{0}', github.sha) || '' }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') && github.ref != 'refs/heads/main' }}

jobs:
  build-and-push:
    name: Build & Push
    # Tags are released by promoting the already-built build image — no rebuild needed.
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: dashboard
          - name: server
    # Matrix legs run in parallel, so PR wall-clock time is unchanged by adding the server image
    # — only total runner-minutes go up. Each leg writes its digest under a name-scoped output key
    # (digest_dashboard / digest_server) since matrix job outputs collapse to one value per key;
    # distinct keys per leg is the standard workaround so `scan` can look up the right digest.
    outputs:
      digest_dashboard: ${{ steps.export.outputs.digest_dashboard }}
      digest_server: ${{ steps.export.outputs.digest_server }}
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # ratchet:docker/setup-buildx-action@v4

      - name: Set image name
        run: |
          SUFFIX="${{ matrix.name == 'server' && '-server' || '' }}"
          echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')${SUFFIX}" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # ratchet:docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # ratchet:docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=pr
            type=raw,value=edge,enable={{is_default_branch}}
            type=sha,prefix=build-,format=short,enable=${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/') }}
            type=raw,value=${{ inputs.version }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push
        id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # ratchet:docker/build-push-action@v7
        with:
          context: .
          target: ${{ matrix.name }}
          platforms: ${{ github.event_name == 'pull_request' && 'linux/amd64' || 'linux/amd64,linux/arm64' }}
          push: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      - name: Export digest
        id: export
        run: echo "digest_${{ matrix.name }}=${{ steps.push.outputs.digest }}" >> "$GITHUB_OUTPUT"

      - name: Attest image
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # ratchet:actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  scan:
    name: Container Scan
    needs: build-and-push
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: dashboard
          - name: server
    permissions:
      contents: read
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    env:
      GRYPE_VERSION: "0.112.0"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0

      - name: Set image name
        run: |
          SUFFIX="${{ matrix.name == 'server' && '-server' || '' }}"
          echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')${SUFFIX}" >> "$GITHUB_ENV"

      - name: Install grype
        run: |
          cd /tmp
          curl -sSfL -o "grype_${GRYPE_VERSION}_linux_amd64.tar.gz" \
            "https://github.com/anchore/grype/releases/download/v${GRYPE_VERSION}/grype_${GRYPE_VERSION}_linux_amd64.tar.gz"
          curl -sSfL -o "grype_${GRYPE_VERSION}_checksums.txt" \
            "https://github.com/anchore/grype/releases/download/v${GRYPE_VERSION}/grype_${GRYPE_VERSION}_checksums.txt"
          grep "grype_${GRYPE_VERSION}_linux_amd64.tar.gz" "grype_${GRYPE_VERSION}_checksums.txt" | sha256sum --check
          tar -xzf "grype_${GRYPE_VERSION}_linux_amd64.tar.gz" -C /usr/local/bin grype

      - name: Scan image
        run: |
          DIGEST="${{ needs.build-and-push.outputs[format('digest_{0}', matrix.name)] }}"
          grype "${IMAGE}@${DIGEST}" \
            --config .grype.yaml \
            -o "template=grype-report.txt" \
            -o "json=grype-report.json"

      - name: Upload scan reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7
        with:
          name: grype-container-scan-${{ matrix.name }}
          path: |
            grype-report.txt
            grype-report.json
          retention-days: 30

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: dashboard
          - name: server
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # ratchet:docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # ratchet:docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name
        run: |
          SUFFIX="${{ matrix.name == 'server' && '-server' || '' }}"
          echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')${SUFFIX}" >> "$GITHUB_ENV"

      # Resolve the digest of the build-{sha} image produced when this commit landed on main.
      # The tag ruleset enforces Container Scan (per image) passed on this commit before the tag
      # could be pushed, so the build image is guaranteed scanned. Using the commit-pinned build
      # tag (not :edge) ensures we promote the exact image for this release regardless of how many
      # commits have landed on main since.
      - name: Resolve build image digest
        id: build
        run: |
          TAG="build-${GITHUB_SHA::7}"
          DIGEST=$(docker buildx imagetools inspect \
            "${IMAGE}:${TAG}" \
            --format '{{.Manifest.Digest}}')
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Promoting ${TAG} @ ${DIGEST}"

      - name: Promote build image to release tags
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          SOURCE="${IMAGE}@${{ steps.build.outputs.digest }}"

          if [[ "${VERSION}" == *-* ]]; then
            # Pre-release (contains -): push the explicit version tag only.
            # Major/minor/latest convenience tags must not point at a pre-release.
            echo "Pre-release detected (${VERSION}) — skipping major/minor/latest tags"
            docker buildx imagetools create \
              --tag "${IMAGE}:${VERSION}" \
              ${SOURCE}
          else
            # Stable release: push all convenience tags.
            MAJOR=$(echo ${VERSION} | cut -d. -f1)
            MINOR=$(echo ${VERSION} | cut -d. -f1-2)
            docker buildx imagetools create \
              --tag "${IMAGE}:${VERSION}" \
              --tag "${IMAGE}:${MINOR}" \
              --tag "${IMAGE}:${MAJOR}" \
              --tag "${IMAGE}:latest" \
              ${SOURCE}
          fi
