buildscript {
    configurations.configureEach {
        resolutionStrategy {
            force 'org.codehaus.plexus:plexus-utils:3.6.1'
            force 'org.bouncycastle:bcpg-jdk18on:1.85'
        }
    }
}

plugins {
    id 'com.diffplug.spotless' version '8.8.0' apply false
    id 'org.cyclonedx.bom' version '3.3.0'
    id 'com.github.node-gradle.node' version '7.1.0' apply false
    id 'com.github.jk1.dependency-license-report' version '3.1.4' apply false
}

ext {
    // Tooling
    palantirJavaFormatVersion = '2.91.0'

    // JGit
    jgitVersion = '7.7.0.202606012155-r'

    // HTTP
    apacheHttpClientVersion = '5.6.2'

    // Jetty / Servlet
    jettyVersion = '12.1.11'
    jakartaServletVersion = '6.1.0'

    // Logging
    slf4jVersion = '2.0.18'
    log4j2Version = '2.26.1'

    // Database
    hikariVersion = '7.1.0'
    h2Version = '2.4.240'
    postgresVersion = '42.7.13'
    mysqlVersion = '9.7.0'
    mariadbVersion = '3.5.9'
    mongoVersion = '5.9.0'

    // Jackson
    jacksonBomVersion = '3.2.1'

    // Spring
    springVersion = '7.0.8'
    springSecurityVersion = '7.1.0'
    springSessionVersion = '4.1.0'
    lettuceVersion = '6.8.2.RELEASE'

    // YAML
    snakeyamlVersion = '2.6'

    // Gestalt config
    gestaltVersion = '0.38.0'

    // BouncyCastle
    bouncyCastleVersion = '1.85'

    // Apache MINA SSHD
    minaSshdVersion = '2.19.0'

    // Lombok
    lombokVersion = '1.18.46'

    // Testing
    junitVersion = '6.1.2'
    junitPlatformVersion = '6.1.0'
    mockitoVersion = '5.23.0'
    testContainersVersion = '2.0.5'

    // Gitleaks (bundled binary)
    gitleaksVersion = '8.30.1'

    // OpenAPI spec generation
    swaggerCoreVersion = '2.2.52'
    swaggerUiVersion = '5.32.8'

}

allprojects {
    group = 'com.rbc.fogwall'
    version = '1.3.0'
    
    repositories {
        mavenCentral()
    }
}


cyclonedxBom {
    projectType = org.cyclonedx.model.Component.Type.APPLICATION
}

tasks.register('installGitHooks') {
    group = 'build setup'
    description = 'Configures git to use the .githooks/ directory (run once after cloning).'
    doLast {
        ['git', 'config', 'core.hooksPath', '.githooks'].execute(null, rootDir).waitFor()
        println 'Git hooks installed — .githooks/pre-commit will run spotlessApply before each commit.'
    }
}

subprojects {
    apply plugin: 'com.diffplug.spotless'
    apply plugin: 'jacoco-report-aggregation'
    apply plugin: 'com.github.jk1.dependency-license-report'

    // Estate-wide CVE pins for transitive-only dependencies (none of these are declared anywhere; they arrive
    // via other libraries and ship in the container images that grype scans). One rule table so pins are
    // auditable in one place — a rule is a no-op in modules where the group never appears.
    configurations.configureEach {
        resolutionStrategy.eachDependency { details ->
            def r = details.requested
            // Netty — pulled in by lettuce-core via spring-session-data-redis (dashboard).
            if (r.group == 'io.netty') {
                details.useVersion '4.1.136.Final'
                details.because 'CVE fix: GHSA-3qp7-7mw8-wx86, GHSA-x4gw-5cx5-pgmh, GHSA-5pvg-856g-cp85, GHSA-676x-f7gg-47vc, GHSA-xmv7-r254-6q78, GHSA-558v-64gr-wgg4'
            }
            // Jackson 2.x core/databind — pulled in by gestalt-yaml (server); the app itself is on the
            // Jackson 3.x line (group tools.jackson), untouched here. Only these two artifacts get 2.22.1
            // patch releases — sibling modules (annotations, dataformats) stay on 2.22.0 and are compatible.
            if (r.group == 'com.fasterxml.jackson.core' && r.name in ['jackson-core', 'jackson-databind']) {
                details.useVersion '2.22.1'
                details.because 'CVE fix: GHSA-r7wm-3cxj-wff9, GHSA-5gvw-p9qm-jgwh, GHSA-5jmj-h7xm-6q6v'
            }
        }
    }

    licenseReport {
        allowedLicensesFile = rootProject.file('gradle-allowed-licenses.json')
        configurations = ['runtimeClasspath']
        excludeOwnGroup = true
        excludeBoms = true
        // These deps have malformed POM license declarations (null name or quoted MIME-style string)
        // but are confirmed Apache-2.0. Overrides in gradle-license-overrides.txt fix the HTML report.
        excludes = ['org.jspecify:jspecify', 'com.nimbusds:oauth2-oidc-sdk']
        renderers = [new com.github.jk1.license.render.InventoryHtmlReportRenderer(
                         'index.html', 'fogwall', rootProject.file('gradle-license-overrides.txt')),
                     new com.github.jk1.license.render.JsonReportRenderer('licenses.json')]
    }

    spotless {
        java {
            palantirJavaFormat("${palantirJavaFormatVersion}").formatJavadoc(true)
        }
    }

    plugins.withId('java') {
        apply plugin: 'jacoco'

        jacocoTestReport {
            dependsOn test
            reports {
                xml.required = true
                html.required = true
            }
        }

        test {
            finalizedBy jacocoTestReport
        }

        // Best-effort extraction of embedded META-INF/LICENSE, META-INF/NOTICE, and root
        // LICENSE/NOTICE file contents from this module's runtime dependency jars, keyed by
        // module coordinates. Maven POM metadata only gives a license *name* + a generic URL —
        // it doesn't reproduce a package's actual copyright line the way most licenses (MIT, BSD,
        // ISC) require. Many jars (especially Apache-licensed ones, which are required to
        // propagate their own NOTICE file) bundle the real text inside the jar itself; this task
        // extracts it where present. Feeds :generateThirdPartyNotices in the root project.
        tasks.register('extractEmbeddedLicenseTexts') {
            group = 'verification'
            description = 'Extracts embedded LICENSE/NOTICE file text from runtime dependency jars'
            def outputFile = layout.buildDirectory.file('reports/dependency-license/embedded-license-text.json')
            inputs.files(configurations.runtimeClasspath)
            outputs.file(outputFile)

            doLast {
                def candidateNames = [
                        'META-INF/LICENSE', 'META-INF/LICENSE.TXT', 'META-INF/LICENSE.MD',
                        'META-INF/NOTICE', 'META-INF/NOTICE.TXT', 'META-INF/NOTICE.MD',
                        'LICENSE', 'LICENSE.TXT', 'LICENSE.MD',
                        'NOTICE', 'NOTICE.TXT', 'NOTICE.MD'
                ] as Set

                def result = [:]
                configurations.runtimeClasspath.resolvedConfiguration.resolvedArtifacts.each { artifact ->
                    def id = artifact.moduleVersion.id
                    def coords = "${id.group}:${id.name}:${id.version}".toString()
                    def file = artifact.file
                    if (!file.name.endsWith('.jar')) return
                    try {
                        new java.util.zip.ZipFile(file).withCloseable { zip ->
                            def found = [:]
                            zip.entries().each { entry ->
                                if (entry.directory) return
                                def normalized = entry.name.replaceAll(/\/$/, '').toUpperCase()
                                if (!candidateNames.contains(normalized)) return
                                def kind = normalized.contains('NOTICE') ? 'notice' : 'license'
                                // Keep the first match of each kind — jars occasionally ship both a
                                // top-level and a META-INF copy of the same file.
                                if (!found.containsKey(kind)) {
                                    def text = zip.getInputStream(entry).getText('UTF-8')
                                    found[kind] = [sourceEntry: entry.name, text: text]
                                }
                            }
                            if (found) result[coords] = found
                        }
                    } catch (Exception e) {
                        logger.warn("extractEmbeddedLicenseTexts: could not read {} for {}: {}", file, coords, e.message)
                    }
                }
                def out = outputFile.get().asFile
                out.parentFile.mkdirs()
                out.text = groovy.json.JsonOutput.toJson(result)
            }
        }
    }
}

// ---------------------------------------------------------------------------
// Third-party notices aggregation
//
// Combines each module's Gradle license-report output (declared license name/URL from Maven
// POM metadata) with best-effort extracted embedded LICENSE/NOTICE text
// (extractEmbeddedLicenseTexts) and the frontend's npm license report, into one attribution file
// per distributable Docker image variant. The `server` image only ships fogwall-core +
// fogwall-server dependencies (no dashboard, no frontend bundle); `dashboard` is a superset that
// also includes fogwall-dashboard's dependencies and the npm/React bundle.
//
// Declared license name/URL alone doesn't satisfy every license's requirements — MIT/BSD/ISC in
// particular expect the package's actual copyright line to be reproduced, not just the license
// name. Embedded text is preferred wherever a jar/npm package actually bundles it; entries with
// no embedded text are marked declared-only rather than silently presented as equally complete.
// ---------------------------------------------------------------------------

def noticesOutputDir = layout.buildDirectory.dir('notices')

// Keyed by "group:artifact" (no version) — the pinned version in the overrides file is only a
// snapshot from whenever malformed-POM handling was last verified and drifts as Dependabot bumps
// the dependency. licenseReport.excludes (which this file backs) also excludes by group:artifact
// only, so matching on version here would silently drop the entry the next time it's bumped.
def parseOverrides = {
    def overridesFile = rootProject.file('gradle-license-overrides.txt')
    def result = [:]
    overridesFile.eachLine { line ->
        line = line.trim()
        if (!line || line.startsWith('#')) return
        def parts = line.split(/\|/)
        if (parts.length < 3) return
        def (group, artifact, ignoredPinnedVersion) = parts[0].split(':')
        result["${group}:${artifact}".toString()] = [
                url               : parts.length > 1 ? parts[1] : null,
                declaredLicense   : parts.length > 2 ? parts[2] : null,
                declaredLicenseUrl: parts.length > 3 ? parts[3] : null
        ]
    }
    result
}

def projectRuntimeCoords = { Project proj ->
    proj.configurations.runtimeClasspath.resolvedConfiguration.resolvedArtifacts.collect {
        "${it.moduleVersion.id.group}:${it.moduleVersion.id.name}:${it.moduleVersion.id.version}".toString()
    } as Set
}

def mergeMavenModules = { List<Project> projects, Map overrides ->
    def modules = [:]
    projects.each { proj ->
        def licensesFile = proj.layout.buildDirectory.file('reports/dependency-license/licenses.json').get().asFile
        def embeddedFile = proj.layout.buildDirectory.file('reports/dependency-license/embedded-license-text.json').get().asFile
        def embedded = embeddedFile.exists() ? new groovy.json.JsonSlurper().parse(embeddedFile) : [:]

        if (licensesFile.exists()) {
            new groovy.json.JsonSlurper().parse(licensesFile).dependencies.each { dep ->
                def key = "${dep.moduleName}:${dep.moduleVersion}".toString()
                if (modules.containsKey(key)) return
                def emb = embedded[key]
                modules[key] = [
                        ecosystem         : 'maven',
                        name              : dep.moduleName,
                        version           : dep.moduleVersion,
                        url               : dep.moduleUrl,
                        declaredLicense   : dep.moduleLicense,
                        declaredLicenseUrl: dep.moduleLicenseUrl,
                        licenseText       : emb?.license?.text,
                        noticeText        : emb?.notice?.text,
                        licenseTextSource : emb ? 'embedded' : 'declared-only'
                ]
            }
        }

        // Modules excluded from the license-report JSON itself (malformed POM license
        // declarations — see licenseReport.excludes in the subprojects block) but genuinely
        // present on this project's runtime classpath. Their correct license info comes from
        // gradle-license-overrides.txt instead. Matched by group:artifact against the actually
        // resolved version on this classpath, not the version pinned in the overrides file.
        projectRuntimeCoords(proj).each { coords ->
            def parts = coords.split(':')
            def ga = "${parts[0]}:${parts[1]}".toString()
            def info = overrides[ga]
            if (!info) return
            if (modules.containsKey(coords)) return
            def emb = embedded[coords]
            modules[coords] = [
                    ecosystem         : 'maven',
                    name              : ga,
                    version           : parts[2],
                    url               : info.url,
                    declaredLicense   : info.declaredLicense,
                    declaredLicenseUrl: info.declaredLicenseUrl,
                    licenseText       : emb?.license?.text,
                    noticeText        : emb?.notice?.text,
                    licenseTextSource : emb ? 'embedded' : 'declared-only'
            ]
        }
    }
    modules.values().sort { it.name }
}

def mergeNpmModules = { File npmJsonFile ->
    if (!npmJsonFile.exists()) return []
    def data = new groovy.json.JsonSlurper().parse(npmJsonFile)
    data.collect { nameAtVersion, info ->
        def idx = nameAtVersion.lastIndexOf('@')
        def name = nameAtVersion.substring(0, idx)
        def version = nameAtVersion.substring(idx + 1)
        def licenseText = null
        if (info.licenseFile) {
            def f = new File(info.licenseFile as String)
            if (f.exists()) licenseText = f.text
        }
        [
                ecosystem         : 'npm',
                name              : name,
                version           : version,
                url               : info.repository,
                declaredLicense   : info.licenses,
                declaredLicenseUrl: null,
                licenseText       : licenseText,
                noticeText        : null,
                licenseTextSource : licenseText ? 'embedded' : 'declared-only'
        ]
    }.sort { it.name }
}

def writeNotices = { String variant, List modules ->
    def dir = new File(noticesOutputDir.get().asFile, variant)
    dir.mkdirs()

    new File(dir, 'THIRD-PARTY-NOTICES.json').text = groovy.json.JsonOutput.prettyPrint(groovy.json.JsonOutput.toJson([
            generatedAt: java.time.Instant.now().toString(),
            variant    : variant,
            modules    : modules
    ]))

    def sb = new StringBuilder()
    sb << "fogwall (${variant} image) — third-party software notices\n"
    sb << ('=' * 70) << '\n\n'
    sb << "fogwall itself is licensed under the Apache License, Version 2.0 — see LICENSE.\n"
    sb << "Generated from build metadata. Entries marked [declared license only] have no\n"
    sb << "license/notice file embedded in the resolved package; only the declared license\n"
    sb << "name/URL is shown, not that package's specific copyright text.\n\n"
    modules.each { m ->
        sb << ('-' * 70) << '\n'
        sb << "${m.name} ${m.version} (${m.ecosystem})\n"
        sb << "License: ${m.declaredLicense ?: 'UNKNOWN'}\n"
        if (m.url) sb << "URL: ${m.url}\n"
        if (m.licenseTextSource == 'declared-only') {
            sb << "[declared license only — no embedded license/notice text found]\n"
        }
        if (m.noticeText) sb << "\n--- NOTICE ---\n${m.noticeText}\n"
        if (m.licenseText) sb << "\n--- LICENSE ---\n${m.licenseText}\n"
        sb << '\n'
    }
    new File(dir, 'THIRD-PARTY-NOTICES.txt').text = sb.toString()
}

def coreProject = project(':fogwall-core')
def serverProject = project(':fogwall-server')
def dashboardProject = project(':fogwall-dashboard')

// Content hand-ported into fogwall-core resources from a third-party source, rather than pulled in as a build
// dependency - the Maven/npm license-report tasks above only see the actual dependency graph, so this needs to be
// listed by hand. Currently just the pattern-bundles regex/context data ported from data-privacy-stack/presidio (MIT); add
// further entries here if fogwall ever vendors another source's content the same way.
def vendoredContentModules = {
    def licenseFile = coreProject.file('src/main/resources/pattern-bundles/UPSTREAM-LICENSE-presidio.txt')
    [[
            ecosystem         : 'vendored-content',
            name              : 'data-privacy-stack/presidio (pattern-bundles regex/context data)',
            version           : '517d13eee659794ed3a55d188752d014be574c2a',
            url               : 'https://github.com/data-privacy-stack/presidio',
            declaredLicense   : 'MIT License',
            declaredLicenseUrl: null,
            licenseText       : licenseFile.exists() ? licenseFile.text : null,
            noticeText        : null,
            licenseTextSource : licenseFile.exists() ? 'embedded' : 'declared-only'
    ]]
}

tasks.register('generateThirdPartyNotices') {
    group = 'build'
    description = 'Generates THIRD-PARTY-NOTICES files for the server and dashboard Docker image variants'
    dependsOn ':fogwall-core:generateLicenseReport', ':fogwall-core:extractEmbeddedLicenseTexts'
    dependsOn ':fogwall-server:generateLicenseReport', ':fogwall-server:extractEmbeddedLicenseTexts'
    dependsOn ':fogwall-dashboard:generateLicenseReport', ':fogwall-dashboard:extractEmbeddedLicenseTexts'
    dependsOn ':fogwall-dashboard:npmLicenseReport'

    outputs.dir(noticesOutputDir)

    doLast {
        def overrides = parseOverrides()
        def vendored = vendoredContentModules()

        writeNotices('server', mergeMavenModules([coreProject, serverProject], overrides) + vendored)

        def dashboardModules = mergeMavenModules([coreProject, serverProject, dashboardProject], overrides)
        def npmModules = mergeNpmModules(dashboardProject.file('frontend/notices/npm-licenses.json'))
        writeNotices('dashboard', dashboardModules + npmModules + vendored)
    }
}
