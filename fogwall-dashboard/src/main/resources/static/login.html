<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>fogwall · sign in</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @variant dark (&:where(.dark, .dark *));
      html { font-size: 18px; }
    </style>
    <script>
      (function () {
        var stored = localStorage.getItem('fogwall-dark-mode');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (stored === 'true' || (stored === null && prefersDark)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body class="bg-gray-100 dark:bg-gray-900 min-h-screen flex flex-col">
    <header class="bg-slate-800 text-white px-6 py-4 shadow flex items-center justify-between">
      <div class="flex items-center gap-2">
        <svg class="h-8 w-auto" viewBox="0 0 28 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M14 1 L26 6 L26 16 C26 23 14 31 14 31 C14 31 2 23 2 16 L2 6 Z" stroke="white" stroke-width="1.8" stroke-linejoin="round" fill="none" opacity="0.85"/>
          <path d="M7 10 Q10 8 14 10 Q18 12 21 10" stroke="white" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.9"/>
          <path d="M7 15 Q10 13 14 15 Q18 17 21 15" stroke="white" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.7"/>
          <path d="M8 20 Q11 18 14 20 Q17 22 20 20" stroke="white" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.5"/>
        </svg>
        <span class="text-xl font-semibold tracking-tight">fogwall</span>
      </div>
      <a
        href="https://github.com/RBC/fogwall/blob/main/docs/CONFIGURATION.md"
        target="_blank"
        rel="noopener noreferrer"
        class="text-sm text-slate-400 hover:text-white transition-colors"
      >
        Docs
      </a>
    </header>

    <main class="flex-1 flex items-center justify-center px-4 py-12">
      <div class="bg-white dark:bg-gray-800 rounded-lg shadow border border-gray-200 dark:border-gray-700 w-full max-w-sm px-8 py-8">
        <h2 class="text-lg font-semibold text-gray-800 dark:text-gray-200 mb-6">Sign in</h2>

        <div id="msg-logout" class="hidden mb-4 text-sm text-green-700 dark:text-green-300 bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-700 rounded px-3 py-2">
          You have been signed out.
        </div>
        <div id="msg-error" class="hidden mb-4 text-sm text-red-700 dark:text-red-300 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-700 rounded px-3 py-2">
          Sign in failed. Check your credentials or contact your administrator.
        </div>

        <form id="login-form" method="post" action="/login" class="space-y-4">
          <div>
            <label for="username" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Username</label>
            <input
              id="username"
              name="username"
              type="text"
              autocomplete="username"
              required
              autofocus
              class="w-full border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-gray-200 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300 dark:focus:ring-blue-700"
            />
          </div>
          <div>
            <label for="password" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Password</label>
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="current-password"
              required
              class="w-full border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-gray-200 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300 dark:focus:ring-blue-700"
            />
          </div>
          <button
            type="submit"
            class="w-full px-4 py-2 text-sm font-medium rounded bg-slate-800 text-white hover:bg-slate-700 transition-colors"
          >
            Sign in
          </button>
        </form>
        <a id="oidc-btn" href="/oauth2/authorization/fogwall" class="hidden w-full block text-center px-4 py-2 text-sm font-medium rounded bg-slate-800 text-white hover:bg-slate-700 transition-colors">
          Sign in with SSO
        </a>
      </div>
    </main>

    <footer class="bg-slate-800 dark:bg-slate-950 text-slate-500 text-xs px-6 py-3 flex items-center justify-between">
      <span>
        &copy; 2024&ndash;2026 fogwall contributors &middot;
        <a href="/legal" class="hover:text-slate-300 transition-colors">Legal</a>
      </span>
      <span class="flex items-center gap-3">
        <a href="https://github.com/RBC/fogwall/blob/main/LICENSE" target="_blank" rel="noopener noreferrer" class="hover:text-slate-300 transition-colors">Apache-2.0</a>
        <a href="https://github.com/RBC/fogwall" target="_blank" rel="noopener noreferrer" class="hover:text-slate-300 transition-colors flex items-center gap-1" title="View on GitHub">
          <svg class="h-3.5 w-3.5" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
          </svg>
          Source
        </a>
      </span>
    </footer>

    <script>
      const p = new URLSearchParams(window.location.search);
      if (p.has("logout")) document.getElementById("msg-logout").classList.remove("hidden");
      if (p.has("error"))  document.getElementById("msg-error").classList.remove("hidden");

      fetch('/api/runtime-config')
        .then(r => r.json())
        .then(cfg => {
          if (cfg.authProvider === 'oidc') {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('oidc-btn').classList.remove('hidden');
          }
        })
        .catch(() => {});
    </script>
  </body>
</html>
